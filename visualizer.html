<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Audio Visualizer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0f0f11;
  color: #fff;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
}

/* ── Top bar ── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 48px;
  min-height: 48px;
  padding: 0 18px;
  background: #1a1a1f;
  border-bottom: 1px solid #26262d;
  z-index: 10;
}

#topbar h1 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.6px;
  color: #d8d8e2;
}

#fps-counter {
  font-size: 11px;
  color: #44444e;
  font-variant-numeric: tabular-nums;
  min-width: 52px;
  text-align: right;
  letter-spacing: 0.2px;
}

/* ── Body row ── */
#body-row {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── Sidebar ── */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: #1a1a1f;
  border-right: 1px solid #26262d;
  display: flex;
  flex-direction: column;
  padding: 18px 14px;
  gap: 20px;
  overflow-y: auto;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #48484f;
  margin-bottom: 10px;
}

/* ── Buttons ── */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  padding: 9px 12px;
  border: 1px solid #28282f;
  border-radius: 7px;
  background: #202028;
  color: #aaaab8;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  outline: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.btn:hover {
  background: #28283a;
  border-color: #38384a;
  color: #d8d8e8;
}

.btn:active {
  background: #1a1a26;
}

.btn.active {
  background: #152040;
  border-color: #2458a0;
  color: #5898e0;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ── Source label ── */
#source-label {
  font-size: 11.5px;
  color: #555560;
  text-align: center;
  min-height: 18px;
  margin-top: 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Level meter ── */
#level-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

#clip-badge {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.6px;
  padding: 2px 6px;
  border-radius: 3px;
  background: #b83020;
  color: #fff;
  opacity: 0;
  transition: opacity 0.08s;
  pointer-events: none;
}

#clip-badge.visible { opacity: 1; }

#level-track {
  width: 100%;
  height: 7px;
  background: #111118;
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid #26262d;
}

#level-bar {
  height: 100%;
  width: 0%;
  border-radius: 3px;
  background: linear-gradient(90deg,
    #22a845 0%,
    #7ec83a 55%,
    #e8c020 78%,
    #e03820 100%
  );
  will-change: width;
}

/* ── Canvas area ── */
#canvas-wrap {
  flex: 1;
  min-width: 0;
  min-height: 0;
  position: relative;
  background: #0f0f11;
  overflow: hidden;
}

#viz-canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ── Tap overlay (iOS) ── */
#tap-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  background: rgba(10, 10, 14, 0.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 50;
  cursor: pointer;
}

#tap-overlay.show { display: flex; }

#tap-overlay .tap-ring {
  width: 56px;
  height: 56px;
  border: 2px solid #3878d0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: tapPulse 2.2s ease-in-out infinite;
}

@keyframes tapPulse {
  0%, 100% { transform: scale(1);    opacity: 0.75; }
  50%       { transform: scale(1.1); opacity: 1;    }
}

#tap-overlay p {
  font-size: 15px;
  color: #b8b8c8;
  font-weight: 500;
}

#tap-overlay small {
  font-size: 11.5px;
  color: #505058;
}

/* ── Idle message ── */
#idle-msg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

#idle-msg span {
  font-size: 14px;
  color: #2a2a34;
  letter-spacing: 0.3px;
}
</style>
</head>
<body>

<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <h1>Audio Visualizer</h1>
    <span id="fps-counter">-- fps</span>
  </div>

  <!-- Body -->
  <div id="body-row">

    <!-- Sidebar -->
    <div id="sidebar">

      <!-- Input source section -->
      <div>
        <div class="section-label">Input Source</div>
        <div style="display:flex;flex-direction:column;gap:8px;">

          <button class="btn" id="btn-mic">
            <!-- mic icon -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8"  y1="23" x2="16" y2="23"/>
            </svg>
            Use Mic
          </button>

          <button class="btn" id="btn-file">
            <!-- music note icon -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6"  cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            Load File
          </button>

          <input type="file" id="file-input" accept="audio/*" style="display:none">
        </div>
        <div id="source-label">No source connected</div>
      </div>

      <!-- Level meter section -->
      <div>
        <div id="level-header">
          <div class="section-label" style="margin:0">Level</div>
          <div id="clip-badge">CLIP</div>
        </div>
        <div id="level-track">
          <div id="level-bar"></div>
        </div>
      </div>

      <!-- Visualizer Mode section -->
      <div>
        <div class="section-label">Visualizer Mode</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn active" id="btn-mode-bars">Bars</button>
          <button class="btn" id="btn-mode-waveform">Waveform</button>
          <button class="btn" id="btn-mode-spectrogram">Spectrogram</button>
        </div>
      </div>

      <div style="flex:1"></div>
    </div><!-- /sidebar -->

    <!-- Canvas area -->
    <div id="canvas-wrap">
      <canvas id="viz-canvas"></canvas>

      <div id="idle-msg">
        <span>Connect an audio source to begin</span>
      </div>

      <!-- iOS tap-to-start overlay -->
      <div id="tap-overlay">
        <div class="tap-ring">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="#3878d0" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </div>
        <p>Tap to start audio</p>
        <small>AudioContext requires a user gesture</small>
      </div>
    </div><!-- /canvas-wrap -->

  </div><!-- /body-row -->
</div><!-- /app -->

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════════════════════════ */
const AudioEngine = (() => {
  const FFT_SIZE   = 8192;
  const SMOOTHING  = 0.8;

  let ctx        = null;
  let analyser   = null;
  let compressor = null;
  let freqBuf    = null;  // reused Uint8Array
  let timeBuf    = null;  // reused Uint8Array

  let activeSource = null;  // MediaStreamAudioSourceNode | AudioBufferSourceNode
  let activeStream = null;  // MediaStream for mic
  let sourceType   = null;  // 'mic' | 'file' | null

  // ── Init ──────────────────────────────────────────────────────
  function init() {
    if (ctx) return;

    const AC = window.AudioContext || window.webkitAudioContext;
    ctx = new AC();

    analyser = ctx.createAnalyser();
    analyser.fftSize              = FFT_SIZE;
    analyser.smoothingTimeConstant = SMOOTHING;

    compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -24;
    compressor.knee.value      = 10;
    compressor.ratio.value     = 4;
    compressor.attack.value    = 0.003;
    compressor.release.value   = 0.25;

    // Topology: source → analyser → compressor → speakers
    analyser.connect(compressor);
    compressor.connect(ctx.destination);

    freqBuf = new Uint8Array(analyser.frequencyBinCount);
    timeBuf = new Uint8Array(analyser.fftSize);
  }

  // ── Tear down active source ────────────────────────────────────
  function disconnectActive() {
    if (activeSource) {
      try { activeSource.disconnect(); } catch (_) {}
      if (typeof activeSource.stop === 'function') {
        try { activeSource.stop(); } catch (_) {}
      }
      activeSource = null;
    }
    if (activeStream) {
      activeStream.getTracks().forEach(t => t.stop());
      activeStream = null;
    }
    sourceType = null;
  }

  // ── Mic ────────────────────────────────────────────────────────
  async function connectMic() {
    init();
    disconnectActive();

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    activeStream = stream;

    if (ctx.state === 'suspended') await ctx.resume();

    const node = ctx.createMediaStreamSource(stream);
    node.connect(analyser);
    activeSource = node;
    sourceType   = 'mic';
  }

  // ── File ───────────────────────────────────────────────────────
  async function connectFile(file) {
    init();
    disconnectActive();

    const arrayBuf  = await file.arrayBuffer();
    const audioBuf  = await ctx.decodeAudioData(arrayBuf);

    if (ctx.state === 'suspended') await ctx.resume();

    const node = ctx.createBufferSource();
    node.buffer = audioBuf;
    node.loop   = true;
    node.connect(analyser);
    node.start(0);
    activeSource = node;
    sourceType   = 'file';
  }

  // ── Data accessors (no allocation) ────────────────────────────
  function getFrequencyData() {
    if (!analyser) return null;
    analyser.getByteFrequencyData(freqBuf);
    return freqBuf;
  }

  function getTimeDomainData() {
    if (!analyser) return null;
    analyser.getByteTimeDomainData(timeBuf);
    return timeBuf;
  }

  // ── RMS level 0–1 ─────────────────────────────────────────────
  function getRMS() {
    if (!timeBuf) return 0;
    let sum = 0;
    const len = timeBuf.length;
    for (let i = 0; i < len; i++) {
      const s = (timeBuf[i] - 128) / 128;
      sum += s * s;
    }
    return Math.sqrt(sum / len);
  }

  // ── Context control ───────────────────────────────────────────
  async function resume() {
    if (ctx && ctx.state === 'suspended') await ctx.resume();
  }

  function getState()      { return ctx ? ctx.state : 'closed'; }
  function getContext()    { return ctx; }
  function getSourceType() { return sourceType; }

  return {
    init, connectMic, connectFile,
    getFrequencyData, getTimeDomainData, getRMS,
    getState, getContext, getSourceType, resume,
  };
})();


/* ═══════════════════════════════════════════════════════════════
   CANVAS + RESIZE
═══════════════════════════════════════════════════════════════ */
const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('viz-canvas');
const g      = canvas.getContext('2d');
const idleEl = document.getElementById('idle-msg');

let logicalW = 1, logicalH = 1;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  logicalW = wrap.clientWidth;
  logicalH = wrap.clientHeight;
  canvas.width  = Math.round(logicalW * dpr);
  canvas.height = Math.round(logicalH * dpr);
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
}

new ResizeObserver(resizeCanvas).observe(wrap);
resizeCanvas();


/* ═══════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════ */
const THEME = {
  accent:      '#1a3888',   // bars gradient bottom
  highlight:   '#40d8ff',   // bars gradient top
  waveRGB:     [80, 148, 232],  // waveform line color as [r,g,b]
};

/* ═══════════════════════════════════════════════════════════════
   VISUALIZER STATE  (all typed arrays allocated once)
═══════════════════════════════════════════════════════════════ */
let currentMode = 'bars';

// ── BARS ──────────────────────────────────────────────────────
const BAR_COUNT  = 128;
const barHeights = new Float32Array(BAR_COUNT);  // smoothed 0-1
let   barsGrad   = null;   // cached gradient; invalidated on resize
let   barsGradH  = -1;

// ── WAVEFORM ──────────────────────────────────────────────────
let wavePhase = 0;
let waveYBuf  = new Float32Array(4096);  // precomputed y values; grown on resize

// ── SPECTROGRAM ───────────────────────────────────────────────
let spectroCanvas    = null;
let spectroCtx2      = null;
let spectroStripData = null;   // ImageData(2, H) — reused every frame
let spectroSW        = 0;
let spectroSH        = 0;

// Heatmap lookup tables: black → purple → red → yellow → white
const heatR = new Uint8Array(256);
const heatG = new Uint8Array(256);
const heatB = new Uint8Array(256);
(function buildHeat() {
  // [value, r, g, b] stops
  const stops = [
    [0,   0,   0,   0  ],
    [80,  80,  0,   110 ],
    [150, 200, 0,   30  ],
    [210, 255, 160, 0   ],
    [255, 255, 255, 255 ],
  ];
  for (let v = 0; v < 256; v++) {
    let lo = stops[0], hi = stops[1];
    for (let s = 1; s < stops.length - 1; s++) {
      if (v >= stops[s][0]) { lo = stops[s]; hi = stops[s + 1]; }
    }
    const t = lo[0] === hi[0] ? 1 : (v - lo[0]) / (hi[0] - lo[0]);
    heatR[v] = Math.round(lo[1] + (hi[1] - lo[1]) * t);
    heatG[v] = Math.round(lo[2] + (hi[2] - lo[2]) * t);
    heatB[v] = Math.round(lo[3] + (hi[3] - lo[3]) * t);
  }
})();

function ensureSpectrogram(W, H) {
  if (spectroCanvas && spectroSW === W && spectroSH === H) return;
  spectroCanvas = document.createElement('canvas');
  spectroCanvas.width  = W;
  spectroCanvas.height = H;
  spectroCtx2 = spectroCanvas.getContext('2d');
  spectroCtx2.fillStyle = '#000';
  spectroCtx2.fillRect(0, 0, W, H);
  spectroStripData = spectroCtx2.createImageData(2, H);
  spectroSW = W;
  spectroSH = H;
}

/* ═══════════════════════════════════════════════════════════════
   MODE RENDERERS
═══════════════════════════════════════════════════════════════ */
function renderBars(freq, W, H) {
  g.fillStyle = '#0f0f11';
  g.fillRect(0, 0, W, H);
  if (!freq) return;

  if (barsGradH !== H) {
    barsGrad  = g.createLinearGradient(0, H, 0, 0);
    barsGrad.addColorStop(0, THEME.accent);
    barsGrad.addColorStop(1, THEME.highlight);
    barsGradH = H;
  }

  const binCount = freq.length;
  const barW     = W / BAR_COUNT;
  const drawW    = Math.max(1, barW - 1);
  const centerY  = H * 0.5;
  const maxBarH  = centerY * 0.95;

  g.fillStyle = barsGrad;

  for (let i = 0; i < BAR_COUNT; i++) {
    const lo = Math.floor(i       * binCount / BAR_COUNT);
    const hi = Math.floor((i + 1) * binCount / BAR_COUNT);
    let sum = 0;
    for (let b = lo; b < hi; b++) sum += freq[b];
    const newVal = (hi > lo) ? sum / ((hi - lo) * 255) : freq[lo] / 255;

    barHeights[i] += (newVal - barHeights[i]) * 0.15;
    const bh = barHeights[i] * maxBarH;
    const x  = i * barW;

    g.fillRect(x, centerY - bh, drawW, bh);  // upward arm
    g.fillRect(x, centerY,      drawW, bh);  // downward mirror
  }
}

function renderWaveform(time, W, H) {
  g.fillStyle = '#0f0f11';
  g.fillRect(0, 0, W, H);
  if (!time) return;

  wavePhase = (wavePhase + 0.002) % 1;
  const tLen    = time.length;
  const phShift = Math.floor(wavePhase * tLen);
  const centerY = H * 0.5;
  const amp     = H * 0.42;
  const [wr, wg, wb] = THEME.waveRGB;

  // Precompute y values (no per-frame allocation — reuse waveYBuf)
  if (W > waveYBuf.length) waveYBuf = new Float32Array(W * 2);
  for (let i = 0; i < W; i++) {
    const idx = (phShift + Math.floor(i * tLen / W)) % tLen;
    waveYBuf[i] = centerY + ((time[idx] - 128) / 128) * amp;
  }

  // Fill: area between waveform and center line
  g.beginPath();
  g.moveTo(0, waveYBuf[0]);
  for (let i = 1; i < W; i++) g.lineTo(i, waveYBuf[i]);
  g.lineTo(W, centerY);
  g.lineTo(0, centerY);
  g.closePath();
  g.fillStyle = `rgba(${wr},${wg},${wb},0.08)`;
  g.fill();

  // Glow line: 6px wide (2px + 4px wider), 0.15 opacity
  g.beginPath();
  g.moveTo(0, waveYBuf[0]);
  for (let i = 1; i < W; i++) g.lineTo(i, waveYBuf[i]);
  g.strokeStyle = `rgba(${wr},${wg},${wb},0.15)`;
  g.lineWidth   = 6;
  g.stroke();

  // Main line: 2px
  g.beginPath();
  g.moveTo(0, waveYBuf[0]);
  for (let i = 1; i < W; i++) g.lineTo(i, waveYBuf[i]);
  g.strokeStyle = `rgb(${wr},${wg},${wb})`;
  g.lineWidth   = 2;
  g.stroke();
}

function renderSpectrogram(freq, W, H) {
  ensureSpectrogram(W, H);

  if (freq) {
    const binCount = freq.length;
    const sh = spectroSH;
    const sd = spectroStripData;

    // Build heatmap strip (y=0 = high freq, y=sh-1 = low freq)
    for (let y = 0; y < sh; y++) {
      const binIdx = Math.min(binCount - 1, Math.floor((1 - y / sh) * binCount));
      const val = freq[binIdx];
      const p   = y * 8;  // 2 pixels × 4 channels each
      sd.data[p]     = heatR[val]; sd.data[p + 1] = heatG[val];
      sd.data[p + 2] = heatB[val]; sd.data[p + 3] = 255;
      sd.data[p + 4] = heatR[val]; sd.data[p + 5] = heatG[val];
      sd.data[p + 6] = heatB[val]; sd.data[p + 7] = 255;
    }

    // Shift buffer left by 2px, then stamp new strip on the right
    spectroCtx2.drawImage(spectroCanvas, -2, 0);
    spectroCtx2.putImageData(sd, spectroSW - 2, 0);
  }

  g.drawImage(spectroCanvas, 0, 0, W, H);
}

/* ═══════════════════════════════════════════════════════════════
   MODE SWITCH
═══════════════════════════════════════════════════════════════ */
function switchMode(mode) {
  currentMode = mode;

  // Clear main canvas
  g.fillStyle = '#0f0f11';
  g.fillRect(0, 0, logicalW, logicalH);

  // Clear spectrogram buffer so old data does not persist
  if (mode === 'spectrogram' && spectroCanvas) {
    spectroCtx2.fillStyle = '#000';
    spectroCtx2.fillRect(0, 0, spectroSW, spectroSH);
  }

  document.getElementById('btn-mode-bars').classList.toggle('active',        mode === 'bars');
  document.getElementById('btn-mode-waveform').classList.toggle('active',    mode === 'waveform');
  document.getElementById('btn-mode-spectrogram').classList.toggle('active', mode === 'spectrogram');
}

/* ═══════════════════════════════════════════════════════════════
   RENDER  (dispatches to active mode renderer)
   freq  → Uint8Array(4096), byte frequency data 0-255
   time  → Uint8Array(8192), byte time-domain data 0-255
═══════════════════════════════════════════════════════════════ */
function render(freq, time) {
  const W = logicalW;
  const H = logicalH;
  switch (currentMode) {
    case 'bars':        renderBars(freq, W, H);        break;
    case 'waveform':    renderWaveform(time, W, H);    break;
    case 'spectrogram': renderSpectrogram(freq, W, H); break;
  }
}


/* ═══════════════════════════════════════════════════════════════
   FPS COUNTER
═══════════════════════════════════════════════════════════════ */
const fpsEl  = document.getElementById('fps-counter');
let fpsCount = 0;
let fpsLast  = performance.now();

function tickFPS(now) {
  fpsCount++;
  const delta = now - fpsLast;
  if (delta >= 1000) {
    fpsEl.textContent = `${Math.round(fpsCount * 1000 / delta)} fps`;
    fpsCount = 0;
    fpsLast  = now;
  }
}


/* ═══════════════════════════════════════════════════════════════
   LEVEL METER
═══════════════════════════════════════════════════════════════ */
const levelBar  = document.getElementById('level-bar');
const clipBadge = document.getElementById('clip-badge');
let   clipTimer = null;

function updateLevelMeter(rms) {
  // Scale so that moderate audio (rms ≈ 0.15) fills ~60% of the bar
  const pct = Math.min(100, rms * 420);
  levelBar.style.width = pct + '%';

  if (rms > 0.9) {
    clipBadge.classList.add('visible');
    clearTimeout(clipTimer);
    clipTimer = setTimeout(() => clipBadge.classList.remove('visible'), 900);
  }
}


/* ═══════════════════════════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════════════════════════ */
let hasSource = false;

function loop(now) {
  requestAnimationFrame(loop);
  tickFPS(now);

  const running = AudioEngine.getState() === 'running';

  idleEl.style.display = (running && hasSource) ? 'none' : '';

  if (!running) {
    render(null, null);
    return;
  }

  const freq = AudioEngine.getFrequencyData();
  const time = AudioEngine.getTimeDomainData();

  render(freq, time);
  updateLevelMeter(AudioEngine.getRMS());
}

requestAnimationFrame(loop);


/* ═══════════════════════════════════════════════════════════════
   UI BINDINGS
═══════════════════════════════════════════════════════════════ */
const btnMic    = document.getElementById('btn-mic');
const btnFile   = document.getElementById('btn-file');
const fileInput = document.getElementById('file-input');
const srcLabel  = document.getElementById('source-label');
const tapOver   = document.getElementById('tap-overlay');

const MIC_HTML = `
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8"  y1="23" x2="16" y2="23"/>
  </svg>
  Use Mic`;

const FILE_HTML = `
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6"  cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
  </svg>
  Load File`;

function setActive(which) {
  btnMic.classList.toggle('active', which === 'mic');
  btnFile.classList.toggle('active', which === 'file');
}

// ── Mic button ────────────────────────────────────────────────
btnMic.addEventListener('click', async () => {
  btnMic.disabled = true;
  btnMic.textContent = 'Connecting…';
  try {
    await AudioEngine.connectMic();
    setActive('mic');
    srcLabel.textContent = 'Microphone active';
    tapOver.classList.remove('show');
    hasSource = true;
  } catch (err) {
    console.error('[AudioEngine] mic error:', err);
    srcLabel.textContent = 'Mic error: ' + (err.message || String(err));
    setActive(null);
  } finally {
    btnMic.disabled = false;
    btnMic.innerHTML = MIC_HTML;
  }
});

// ── File button ───────────────────────────────────────────────
btnFile.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;

  btnFile.disabled = true;
  btnFile.textContent = 'Loading…';
  try {
    await AudioEngine.connectFile(file);
    setActive('file');
    srcLabel.textContent = '▶ ' + file.name;
    tapOver.classList.remove('show');
    hasSource = true;
  } catch (err) {
    console.error('[AudioEngine] file error:', err);
    srcLabel.textContent = 'Error: ' + (err.message || String(err));
    setActive(null);
  } finally {
    btnFile.disabled = false;
    btnFile.innerHTML = FILE_HTML;
    fileInput.value = '';
  }
});


/* ═══════════════════════════════════════════════════════════════
   iOS / SAFARI — resume AudioContext on first user gesture
═══════════════════════════════════════════════════════════════ */
function isMobile() {
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
}

if (isMobile()) {
  tapOver.classList.add('show');
}

async function resumeOnGesture() {
  const ac = AudioEngine.getContext();
  if (ac && ac.state === 'suspended') {
    await AudioEngine.resume();
  }
  if (AudioEngine.getState() === 'running') {
    tapOver.classList.remove('show');
  }
}

document.addEventListener('touchstart', resumeOnGesture, { passive: true, once: false });
document.addEventListener('click',      resumeOnGesture, { passive: true, once: false });


/* ═══════════════════════════════════════════════════════════════
   MODE BUTTON BINDINGS
═══════════════════════════════════════════════════════════════ */
document.getElementById('btn-mode-bars').addEventListener('click',
  () => switchMode('bars'));
document.getElementById('btn-mode-waveform').addEventListener('click',
  () => switchMode('waveform'));
document.getElementById('btn-mode-spectrogram').addEventListener('click',
  () => switchMode('spectrogram'));
</script>
